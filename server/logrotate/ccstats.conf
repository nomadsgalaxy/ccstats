# ccstats — log rotation policy for the MAIN stats box.
#
# Installed to /etc/logrotate.d/ccstats by server/deploy.sh. It is run automatically by the
# distro's logrotate — via the systemd logrotate.timer on modern Debian/Ubuntu, or via
# /etc/cron.daily/logrotate on older setups. NOTE: logrotate is its own package (NOT part of
# systemd); it ships in the Debian/Ubuntu base system, so on the supported targets it is always
# present. deploy.sh warns if /etc/logrotate.d is missing.
#
# Two generations of log layout, both covered:
#   /var/log/claude-stats*.log  — pre-1.2.1 root crons (legacy boxes, and old
#                                 files left behind after the de-root migration)
#   /var/log/ccstats/*.log      — v1.2.1+ de-rooted units (StandardOutput=append:
#                                 as the 'ccollector' user)

/var/log/claude-stats*.log {
    weekly
    rotate 8
    maxsize 50M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

# su: the parent dir is ccollector-owned, which logrotate otherwise refuses.
# copytruncate: the two daemons keep their log fd open across rotations.
/var/log/ccstats/*.log {
    su ccollector ccollector
    weekly
    rotate 8
    maxsize 50M
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
